<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choppiness Index Gauge Meter</title>
    <script src="https://cdn.amcharts.com/lib/5/index.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/xy.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/radar.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/themes/Animated.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        
        .description {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        #chartdiv {
            width: 100%;
            height: 500px;
            margin-bottom: 30px;
        }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
        }
        
        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
        }
        
        input, select {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .info-panel {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .info-label {
            font-weight: 600;
            color: #666;
        }
        
        .info-value {
            color: #333;
            font-weight: 500;
        }
        
        .interpretation {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: 500;
        }
        
        .choppy {
            background: #fff3cd;
            color: #856404;
            border-left: 4px solid #ffc107;
        }
        
        .trending {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Choppiness Index Gauge Meter</h1>
        <p class="description">
            Choppiness Index วัดความผันผวนของตลาด โดยค่า 0-38.2 แสดงตลาดมี Trend ชัดเจน, 
            38.2-61.8 แสดงตลาด Sideways/Choppy และ 61.8-100 แสดงตลาดผันผวนมาก
        </p>
        
        <div id="chartdiv"></div>
        
        <div class="controls">
            <div class="control-group">
                <label for="symbol">Symbol (Asset)</label>
                <input type="text" id="symbol" value="AAPL" placeholder="เช่น AAPL, BTCUSD">
            </div>
            
            <div class="control-group">
                <label for="period">Period (จำนวนวัน)</label>
                <input type="number" id="period" value="14" min="5" max="100">
            </div>
            
            <div class="control-group">
                <label for="dataSource">แหล่งข้อมูล</label>
                <select id="dataSource">
                    <option value="random">Random Data (Demo)</option>
                    <option value="manual">Manual Input</option>
                </select>
            </div>
            
            <div class="control-group" style="justify-content: flex-end;">
                <label>&nbsp;</label>
                <button onclick="calculateAndUpdate()">คำนวณ Choppiness</button>
            </div>
        </div>
        
        <div class="info-panel">
            <div class="info-row">
                <span class="info-label">Choppiness Index:</span>
                <span class="info-value" id="choppyValue">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Period:</span>
                <span class="info-value" id="periodValue">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Asset:</span>
                <span class="info-value" id="assetValue">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">สถานะตลาด:</span>
                <span class="info-value" id="marketStatus">-</span>
            </div>
        </div>
        
        <div id="interpretation"></div>
    </div>

    <script>
        // Global variables
        var root;
        var chart;
        var xAxis;
        var axisDataItem;
        var clockHand;
        var label;

        // Initialize chart
        function initChart() {
            // Create root element
            root = am5.Root.new("chartdiv");

            // Set themes
            root.setThemes([
                am5themes_Animated.new(root)
            ]);

            // Create chart
            chart = root.container.children.push(am5radar.RadarChart.new(root, {
                panX: false,
                panY: false,
                startAngle: 180,
                endAngle: 360
            }));

            // Create axis and its renderer
            var axisRenderer = am5radar.AxisRendererCircular.new(root, {
                innerRadius: -40
            });

            axisRenderer.grid.template.setAll({
                stroke: root.interfaceColors.get("background"),
                visible: true,
                strokeOpacity: 0.8
            });

            xAxis = chart.xAxes.push(am5xy.ValueAxis.new(root, {
                maxDeviation: 0,
                min: 0,
                max: 100,
                strictMinMax: true,
                renderer: axisRenderer
            }));

            // Add clock hand
            axisDataItem = xAxis.makeDataItem({});

            clockHand = am5radar.ClockHand.new(root, {
                pinRadius: am5.percent(20),
                radius: am5.percent(100),
                bottomWidth: 40
            });

            var bullet = axisDataItem.set("bullet", am5xy.AxisBullet.new(root, {
                sprite: clockHand
            }));

            xAxis.createAxisRange(axisDataItem);

            label = chart.radarContainer.children.push(am5.Label.new(root, {
                fill: am5.color(0xffffff),
                centerX: am5.percent(50),
                textAlign: "center",
                centerY: am5.percent(50),
                fontSize: "3em"
            }));

            axisDataItem.set("value", 50);
            
            bullet.get("sprite").on("rotation", function () {
                var value = axisDataItem.get("value");
                var fill = am5.color(0x000000);
                
                xAxis.axisRanges.each(function (axisRange) {
                    if (value >= axisRange.get("value") && value <= axisRange.get("endValue")) {
                        fill = axisRange.get("axisFill").get("fill");
                    }
                });

                label.set("text", Math.round(value * 10) / 10);

                clockHand.pin.animate({ 
                    key: "fill", 
                    to: fill, 
                    duration: 500, 
                    easing: am5.ease.out(am5.ease.cubic) 
                });
                
                clockHand.hand.animate({ 
                    key: "fill", 
                    to: fill, 
                    duration: 500, 
                    easing: am5.ease.out(am5.ease.cubic) 
                });
            });

            chart.bulletsContainer.set("mask", undefined);

            // Create axis ranges bands for Choppiness Index
            var bandsData = [{
                title: "Strong Trend",
                color: "#0f9747",
                lowScore: 0,
                highScore: 38.2
            }, {
                title: "Sideways",
                color: "#fdae19",
                lowScore: 38.2,
                highScore: 61.8
            }, {
                title: "Choppy",
                color: "#ee1f25",
                lowScore: 61.8,
                highScore: 100
            }];

            am5.array.each(bandsData, function (data) {
                var axisRange = xAxis.createAxisRange(xAxis.makeDataItem({}));

                axisRange.setAll({
                    value: data.lowScore,
                    endValue: data.highScore
                });

                axisRange.get("axisFill").setAll({
                    visible: true,
                    fill: am5.color(data.color),
                    fillOpacity: 0.8
                });

                axisRange.get("label").setAll({
                    text: data.title,
                    inside: true,
                    radius: 15,
                    fontSize: "0.9em",
                    fill: root.interfaceColors.get("background")
                });
            });

            // Make stuff animate on load
            chart.appear(1000, 100);
        }

        // Update gauge value
        function updateGauge(value) {
            if (axisDataItem) {
                axisDataItem.animate({
                    key: "value",
                    to: value,
                    duration: 800,
                    easing: am5.ease.out(am5.ease.cubic)
                });
            }
        }

        // Calculate Choppiness Index
        function calculateChoppinessIndex(highLowData, period) {
            if (highLowData.length < period) {
                console.error("ข้อมูลไม่เพียงพอสำหรับการคำนวณ");
                return null;
            }

            // Get the last 'period' days
            var data = highLowData.slice(-period);
            
            // Calculate High-Low range sum
            var sumRange = 0;
            for (var i = 0; i < data.length; i++) {
                sumRange += (data[i].high - data[i].low);
            }

            // Calculate highest high and lowest low in the period
            var highestHigh = Math.max.apply(Math, data.map(function(d) { return d.high; }));
            var lowestLow = Math.min.apply(Math, data.map(function(d) { return d.low; }));
            
            // Choppiness Index formula
            var choppiness = 100 * Math.log10(sumRange / (highestHigh - lowestLow)) / Math.log10(period);
            
            return choppiness;
        }

        // Generate random OHLC data for demo
        function generateRandomData(days, startPrice) {
            startPrice = startPrice || 100;
            var data = [];
            var price = startPrice;
            
            for (var i = 0; i < days; i++) {
                var volatility = (Math.random() * 0.04) - 0.02; // -2% to +2%
                var open = price;
                var close = price * (1 + volatility);
                var high = Math.max(open, close) * (1 + Math.random() * 0.02);
                var low = Math.min(open, close) * (1 - Math.random() * 0.02);
                
                data.push({
                    high: high,
                    low: low,
                    open: open,
                    close: close
                });
                
                price = close;
            }
            
            return data;
        }

        // Calculate and update display
        function calculateAndUpdate() {
            var symbol = document.getElementById('symbol').value || 'DEMO';
            var period = parseInt(document.getElementById('period').value) || 14;
            var dataSource = document.getElementById('dataSource').value;
            
            // Generate or get data
            var data;
            if (dataSource === 'random') {
                data = generateRandomData(period + 10, 100);
            } else {
                alert('Manual input ยังไม่รองรับในเวอร์ชันนี้ กรุณาใช้ Random Data');
                return;
            }
            
            // Calculate choppiness
            var choppiness = calculateChoppinessIndex(data, period);
            
            if (choppiness !== null) {
                // Update gauge
                updateGauge(choppiness);
                
                // Update info panel
                document.getElementById('choppyValue').textContent = choppiness.toFixed(2);
                document.getElementById('periodValue').textContent = period + ' วัน';
                document.getElementById('assetValue').textContent = symbol;
                
                // Determine market status and interpretation
                var status, interpretation, className;
                if (choppiness < 38.2) {
                    status = '📈 Trending (มี Trend ชัดเจน)';
                    interpretation = 'ตลาดกำลังมี Trend ชัดเจน เหมาะสำหรับการใช้กลยุทธ์ Trend Following';
                    className = 'trending';
                } else if (choppiness < 61.8) {
                    status = '↔️ Sideways/Choppy (แกว่งตัว)';
                    interpretation = 'ตลาดอยู่ในช่วง Sideways/Choppy ควรระมัดระวังในการเข้า Trend และอาจพิจารณากลยุทธ์ Range Trading';
                    className = 'choppy';
                } else {
                    status = '⚠️ Very Choppy (ผันผวนมาก)';
                    interpretation = 'ตลาดผันผวนมาก ควรรอให้ตลาดมีทิศทางชัดเจนก่อนเข้าเทรด หรือใช้กลยุทธ์ที่เหมาะกับตลาดแบบ Range';
                    className = 'choppy';
                }
                
                document.getElementById('marketStatus').textContent = status;
                
                var interpretDiv = document.getElementById('interpretation');
                interpretDiv.className = 'interpretation ' + className;
                interpretDiv.innerHTML = '<strong>การตีความ:</strong> ' + interpretation;
            }
        }

        // Initialize on page load
        window.addEventListener('load', function() {
            initChart();
            
            // Auto calculate after chart loads
            setTimeout(function() {
                calculateAndUpdate();
            }, 1000);
        });
    </script>
</body>
</html>
